<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Hausverwaltungs-Agent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#0f172a}
input,select,textarea,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite}
</style>
</head>
<body>
<div id="app"></div>
<script>
const C = {
  ink:"#0f172a",slate:"#475569",muted:"#94a3b8",line:"#e2e8f0",
  surface:"#f8fafc",white:"#ffffff",
  gold:"#c49a1a",goldLt:"#fefce8",goldBdr:"#fde68a",
  green:"#166534",greenLt:"#dcfce7",
  blue:"#1e40af",blueLt:"#dbeafe",
  red:"#dc2626",redLt:"#fee2e2"
};

const KACHELN = [
  {id:"kontakt",icon:"👤",titel:"Kontaktdaten",pflicht:true,
   felder:["Vor- & Nachname","Telefonnummer","E-Mail-Adresse","Postanschrift"],
   info:"Vollständige Daten für Angebot & Vertragsversand"},
  {id:"objekt",icon:"🏢",titel:"Objektdaten",pflicht:true,
   felder:["Objektadresse","Anzahl Einheiten","Baujahr","Objekttyp (MFH/WEG/EFH)","Wohnfläche gesamt (m²)"],
   info:"Grundlage für die Kalkulation der Verwaltungsgebühr"},
  {id:"aktuell",icon:"📋",titel:"Aktuelle Situation",pflicht:true,
   felder:["Bisheriger Verwalter (ja/nein)","Kündigungsfrist bestehend","Hauptproblem / Anlass","Gewünschter Starttermin"],
   info:"Wichtig für Übernahme-Planung und Angebotsgestaltung"},
  {id:"leistung",icon:"⚙️",titel:"Gewünschte Leistungen",pflicht:true,
   felder:["Kaufmännische Verwaltung","Technische Verwaltung","WEG-Verwaltung","Mietersuche / Vermietung","Buchhaltung & Abrechnung"],
   info:"Bestimmt Leistungsumfang und Preis"},
  {id:"mieter",icon:"🔑",titel:"Mieterdaten",pflicht:false,
   felder:["Anzahl aktuelle Mieter","Leerstandsquote","Offene Mietschulden","Laufende Streitigkeiten"],
   info:"Für Risikoeinschätzung und Preisgestaltung"},
  {id:"finanzen",icon:"💶",titel:"Finanzielles",pflicht:false,
   felder:["Monatliche Gesamtmiete (Soll)","Hausgeldkonto vorhanden","Instandhaltungsrücklage","Budget für Verwaltung (ca.)"],
   info:"Ermöglicht faire und marktgerechte Kalkulation"},
  {id:"dokumente",icon:"📁",titel:"Dokumente bereitstellen",pflicht:false,
   felder:["Grundbuchauszug","Teilungserklärung (WEG)","Aktuelle Mietverträge","Letzte Nebenkostenabrechnung","Energieausweis"],
   info:"Beschleunigt Angebotserstellung & Vertragsstart"},
  {id:"sonstiges",icon:"📝",titel:"Besonderheiten",pflicht:false,
   felder:["Denkmalschutz","Gewerbliche Einheiten","Aufzug vorhanden","Tiefgarage / Stellplätze","Besondere Wünsche"],
   info:"Individuelle Faktoren die den Preis beeinflussen"}
];

const EMAIL_CHIPS = [
  {val:"zu viel Verwaltungsaufwand",label:"⏱ Zeitaufwand"},
  {val:"rechtliche Unsicherheit",label:"⚖️ Rechtsfragen"},
  {val:"Mieterprobleme",label:"🏠 Mieterprobleme"},
  {val:"schlechte Rendite",label:"📉 Rendite"},
  {val:"Leerstand",label:"🔑 Leerstand"}
];

let state = {
  tab:"email",
  email:{name:"",typ:"Privatvermieter",einheiten:"1–3 Einheiten",ton:"freundlich-professionell",laenge:"mittel (ca. 250 Wörter)",hinweise:"",chips:["zu viel Verwaltungsaufwand"],loading:false,result:null,error:""},
  angebot:{checked:{},expanded:"kontakt",loading:false,result:null,error:""}
};

function setState(path,val){
  const keys=path.split(".");
  let obj=state;
  for(let i=0;i<keys.length-1;i++) obj=obj[keys[i]];
  obj[keys[keys.length-1]]=val;
  render();
}

// API via Netlify Function (kein Key im Browser)
async function callClaude(system,user,maxTokens=1000){
  const res=await fetch("/.netlify/functions/claude",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:maxTokens,system,messages:[{role:"user",content:user}]})
  });
  const data=await res.json();
  if(data.error) throw new Error(typeof data.error==="object"?data.error.message:data.error);
  const raw=data.content?.map(b=>b.text||"").join("")||"";
  return JSON.parse(raw.replace(/```json|```/g,"").trim());
}

// DOM helpers
function h(tag,attrs={},...children){
  const el=document.createElement(tag);
  for(const[k,v] of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of children.flat()){
    if(c==null) continue;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return el;
}

function field(label,opts={}){
  const wrap=h("div",{});
  if(label) wrap.appendChild(h("label",{style:{display:"block",fontSize:"11px",fontWeight:"700",color:C.slate,marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.06em"}},label));
  const s={width:"100%",padding:"10px 13px",border:`1px solid ${C.line}`,borderRadius:"10px",fontSize:"15px",color:C.ink,background:C.surface,outline:"none",WebkitAppearance:"none",boxSizing:"border-box"};
  let el;
  if(opts.type==="select"){
    el=h("select",{style:s});
    (opts.options||[]).forEach(o=>{
      const opt=document.createElement("option");
      opt.value=o.val||o; opt.textContent=o.label||o;
      if((o.val||o)===opts.value) opt.selected=true;
      el.appendChild(opt);
    });
    el.addEventListener("change",e=>opts.onChange&&opts.onChange(e.target.value));
  } else if(opts.type==="textarea"){
    el=h("textarea",{style:{...s,resize:"vertical",minHeight:"70px"}});
    el.value=opts.value||"";
    if(opts.placeholder) el.placeholder=opts.placeholder;
    el.addEventListener("input",e=>opts.onChange&&opts.onChange(e.target.value));
  } else {
    el=h("input",{style:s});
    el.value=opts.value||"";
    if(opts.placeholder) el.placeholder=opts.placeholder;
    el.addEventListener("input",e=>opts.onChange&&opts.onChange(e.target.value));
  }
  wrap.appendChild(el);
  return wrap;
}

function primaryBtn(label,onClick,opts={}){
  return h("button",{
    style:{width:"100%",padding:"13px",background:opts.disabled?C.muted:(opts.gold?C.gold:C.ink),color:"#fff",border:"none",borderRadius:"10px",fontSize:"14px",fontWeight:"700",cursor:opts.disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"},
    ...(opts.disabled?{}:{onClick})
  },...(Array.isArray(label)?label:[label]));
}

function spinnerEl(dark=false){
  const d=h("div",{style:{width:"18px",height:"18px",border:`2.5px solid ${dark?C.line:"rgba(255,255,255,0.3)"}`,borderTopColor:dark?C.gold:"#fff",borderRadius:"50%"}});
  d.className="spin"; return d;
}

function card(...ch){return h("div",{style:{background:C.white,border:`1px solid ${C.line}`,borderRadius:"16px",overflow:"hidden"}},...ch);}

function sHead(text,extra){
  const r=h("div",{style:{padding:"13px 16px",borderBottom:`1px solid ${C.line}`,fontSize:"11px",fontWeight:"700",color:C.slate,textTransform:"uppercase",letterSpacing:"0.07em",display:"flex",alignItems:"center",gap:"8px"}},text);
  if(extra) r.appendChild(extra);
  return r;
}

function badge(text,color="gold"){
  const m={gold:[C.goldLt,C.gold,C.goldBdr],green:[C.greenLt,C.green,"#86efac"],blue:[C.blueLt,C.blue,"#93c5fd"],red:[C.redLt,C.red,"#fca5a5"]};
  const[bg,cl,bd]=m[color]||m.gold;
  return h("span",{style:{fontSize:"10px",fontWeight:"700",padding:"2px 8px",borderRadius:"20px",background:bg,color:cl,border:`1px solid ${bd}`,textTransform:"uppercase",letterSpacing:"0.05em"}},text);
}

function copyBtn(getText){
  const b=h("button",{style:{marginLeft:"auto",padding:"4px 12px",border:`1px solid ${C.line}`,borderRadius:"6px",background:C.surface,fontSize:"12px",fontWeight:"600",color:C.slate,cursor:"pointer"}},"Kopieren");
  b.addEventListener("click",()=>{
    navigator.clipboard.writeText(getText());
    b.textContent="✓ Kopiert"; b.style.color=C.green; b.style.borderColor=C.green; b.style.background=C.greenLt;
    setTimeout(()=>{b.textContent="Kopieren";b.style.color=C.slate;b.style.borderColor=C.line;b.style.background=C.surface;},2000);
  });
  return b;
}

function errBox(msg){return h("div",{style:{background:C.redLt,border:"1px solid #fca5a5",borderRadius:"8px",padding:"14px",color:C.red,fontSize:"14px"}},msg);}

// EMAIL TAB
function renderEmail(){
  const s=state.email;
  const wrap=h("div",{style:{display:"flex",flexDirection:"column",gap:"16px",padding:"16px 16px 100px"}});
  const body=h("div",{style:{padding:"16px",display:"flex",flexDirection:"column",gap:"14px"}});

  body.appendChild(field("Name des Kunden",{placeholder:"z. B. Herr Müller",value:s.name,onChange:v=>setState("email.name",v)}));
  body.appendChild(field("Kundentyp",{type:"select",value:s.typ,options:["Privatvermieter","Eigentümergemeinschaft (WEG)","Kapitalanleger / Investor","Erstkäufer / Erstvermietung"],onChange:v=>setState("email.typ",v)}));
  body.appendChild(field("Anzahl Einheiten",{type:"select",value:s.einheiten,options:["1–3 Einheiten","4–10 Einheiten","11–30 Einheiten","mehr als 30 Einheiten"],onChange:v=>setState("email.einheiten",v)}));

  // Chips
  const cWrap=h("div",{});
  cWrap.appendChild(h("label",{style:{display:"block",fontSize:"11px",fontWeight:"700",color:C.slate,marginBottom:"8px",textTransform:"uppercase",letterSpacing:"0.06em"}},"Hauptproblem"));
  const cRow=h("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px"}});
  EMAIL_CHIPS.forEach(c=>{
    const active=s.chips.includes(c.val);
    const chip=h("div",{style:{padding:"7px 13px",borderRadius:"20px",fontSize:"13px",fontWeight:"500",cursor:"pointer",border:`1px solid ${active?C.gold:C.line}`,background:active?C.goldLt:C.surface,color:active?C.gold:C.slate}},c.label);
    chip.addEventListener("click",()=>{const cur=state.email.chips;setState("email.chips",cur.includes(c.val)?cur.filter(x=>x!==c.val):[...cur,c.val]);});
    cRow.appendChild(chip);
  });
  cWrap.appendChild(cRow);
  body.appendChild(cWrap);

  const grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}});
  grid.appendChild(field("Ton",{type:"select",value:s.ton,options:[{val:"freundlich-professionell",label:"Freundlich"},{val:"formell und seriös",label:"Formell"},{val:"direkt und lösungsorientiert",label:"Direkt"}],onChange:v=>setState("email.ton",v)}));
  grid.appendChild(field("Länge",{type:"select",value:s.laenge,options:[{val:"kurz (ca. 120 Wörter)",label:"Kurz"},{val:"mittel (ca. 250 Wörter)",label:"Mittel"},{val:"ausführlich (ca. 400 Wörter)",label:"Lang"}],onChange:v=>setState("email.laenge",v)}));
  body.appendChild(grid);
  body.appendChild(field("Hinweise (optional)",{type:"textarea",placeholder:"z. B. kostenlose Erstberatung erwähnen…",value:s.hinweise,onChange:v=>setState("email.hinweise",v)}));
  body.appendChild(s.loading?primaryBtn([spinnerEl()," Generiere…"],null,{disabled:true}):primaryBtn("✉️ Angebot generieren",generateEmail));

  wrap.appendChild(card(sHead("👤 Kundendaten eingeben"),body));

  if(s.loading||s.result||s.error){
    const rb=h("div",{style:{padding:"16px"}});
    if(s.loading){const ld=h("div",{style:{textAlign:"center",padding:"40px",color:C.muted}});const sp=h("div",{style:{width:"32px",height:"32px",border:`3px solid ${C.line}`,borderTopColor:C.gold,borderRadius:"50%",margin:"0 auto 12px"}});sp.className="spin";ld.appendChild(sp);ld.appendChild(h("p",{style:{fontSize:"14px"}},"KI schreibt deine E-Mail…"));rb.appendChild(ld);}
    if(s.error) rb.appendChild(errBox(s.error));
    if(s.result){
      const r=s.result;
      const tags=h("div",{style:{display:"flex",gap:"6px",marginBottom:"14px",flexWrap:"wrap"}});
      tags.appendChild(badge(s.typ,"blue")); tags.appendChild(badge(s.einheiten,"gold"));
      rb.appendChild(tags);
      rb.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"4px"}},"Betreff"));
      rb.appendChild(h("div",{style:{fontSize:"16px",fontWeight:"700",color:C.ink,marginBottom:"18px",paddingBottom:"14px",borderBottom:`1px solid ${C.line}`,lineHeight:"1.4"}},r.betreff));
      rb.appendChild(h("div",{style:{fontSize:"15px",lineHeight:"1.85",color:"#334155",whiteSpace:"pre-wrap"}},r.email));
      wrap.appendChild(card(sHead("📧 Generierte E-Mail",copyBtn(()=>`Betreff: ${r.betreff}\n\n${r.email}`)),rb));
      return wrap;
    }
    wrap.appendChild(card(sHead("📧 Generierte E-Mail"),rb));
  }
  return wrap;
}

async function generateEmail(){
  setState("email.loading",true); setState("email.result",null); setState("email.error","");
  const s=state.email;
  try{
    const r=await callClaude(
      `Du bist Vertriebsexperte für Hausverwaltung. Schreibe überzeugende Angebots-E-Mails auf Deutsch.\nAntworte NUR mit JSON ohne Backticks: {"betreff":"...","email":"..."}\nPersönlicher Einstieg, Schmerzpunkte, konkrete Vorteile, Call-to-Action (kostenlose Erstberatung), Unterschrift: Ihr Hausverwaltungs-Team`,
      `E-Mail für: ${s.name||"Interessent"}, Typ: ${s.typ}, Einheiten: ${s.einheiten}, Probleme: ${s.chips.join(", ")||"Verwaltungsaufwand"}, Ton: ${s.ton}, Länge: ${s.laenge}${s.hinweise?`, Hinweise: ${s.hinweise}`:""}`
    );
    state.email.loading=false; state.email.result=r; state.email.error="";
  }catch(e){state.email.loading=false;state.email.result=null;state.email.error=e.message||"Fehler — bitte erneut versuchen.";}
  render();
}

// ANGEBOT TAB
function renderAngebot(){
  const s=state.angebot;
  const wrap=h("div",{style:{display:"flex",flexDirection:"column",gap:"14px",padding:"16px 16px 100px"}});
  const totalFields=KACHELN.reduce((a,k)=>a+k.felder.length,0);
  const totalDone=Object.values(s.checked).filter(Boolean).length;
  const pct=Math.round((totalDone/totalFields)*100);
  const allPflicht=KACHELN.filter(k=>k.pflicht).every(k=>k.felder.every(f=>s.checked[`${k.id}::${f}`]));

  // Progress
  const prog=h("div",{style:{padding:"16px",background:C.white,border:`1px solid ${C.line}`,borderRadius:"16px"}});
  const pt=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}});
  pt.appendChild(h("span",{style:{fontSize:"13px",fontWeight:"600",color:C.slate}},"Vollständigkeit"));
  pt.appendChild(h("span",{style:{fontSize:"24px",fontWeight:"800",color:pct>=60?C.green:C.gold}},pct+"%"));
  prog.appendChild(pt);
  const bar=h("div",{style:{height:"8px",background:C.line,borderRadius:"8px",overflow:"hidden"}});
  bar.appendChild(h("div",{style:{height:"100%",width:pct+"%",background:pct>=60?"#22c55e":C.gold,borderRadius:"8px",transition:"width 0.4s"}}));
  prog.appendChild(bar);
  const pb=h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:"8px"}});
  pb.appendChild(h("span",{style:{fontSize:"12px",color:C.muted}},`${totalDone} von ${totalFields} Feldern`));
  pb.appendChild(h("span",{style:{fontSize:"12px",fontWeight:"600",color:allPflicht?C.green:C.red}},allPflicht?"✓ Pflichtfelder komplett":"⚠ Pflichtfelder fehlen"));
  prog.appendChild(pb);
  wrap.appendChild(prog);

  // Kacheln
  KACHELN.forEach(k=>{
    const done=k.felder.filter(f=>s.checked[`${k.id}::${f}`]).length;
    const complete=done===k.felder.length;
    const open=s.expanded===k.id;
    const kc=h("div",{style:{background:C.white,border:`1px solid ${C.line}`,borderRadius:"16px",overflow:"hidden"}});
    const kh=h("div",{style:{padding:"14px 16px",display:"flex",alignItems:"center",gap:"12px",cursor:"pointer"}});
    kh.addEventListener("click",()=>setState("angebot.expanded",open?null:k.id));
    kh.appendChild(h("div",{style:{width:"42px",height:"42px",borderRadius:"10px",flexShrink:"0",fontSize:"20px",background:complete?C.greenLt:(k.pflicht?C.goldLt:C.surface),border:`1px solid ${complete?"#86efac":(k.pflicht?C.goldBdr:C.line)}`,display:"flex",alignItems:"center",justifyContent:"center"}},complete?"✅":k.icon));
    const ki=h("div",{style:{flex:"1",minWidth:"0"}});
    const kt=h("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"4px"}});
    kt.appendChild(h("span",{style:{fontSize:"14px",fontWeight:"700",color:C.ink}},k.titel));
    if(k.pflicht) kt.appendChild(badge("Pflicht","red"));
    ki.appendChild(kt);
    const kb=h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
    const kbw=h("div",{style:{flex:"1",height:"4px",background:C.line,borderRadius:"4px",overflow:"hidden"}});
    kbw.appendChild(h("div",{style:{height:"100%",width:`${(done/k.felder.length)*100}%`,background:complete?"#22c55e":C.gold,borderRadius:"4px"}}));
    kb.appendChild(kbw);
    kb.appendChild(h("span",{style:{fontSize:"11px",color:C.muted,fontWeight:"600",flexShrink:"0"}},`${done}/${k.felder.length}`));
    ki.appendChild(kb); kh.appendChild(ki);
    kh.appendChild(h("span",{style:{color:C.muted,fontSize:"16px",flexShrink:"0"}},open?"▲":"▼"));
    kc.appendChild(kh);

    if(open){
      const bd=h("div",{style:{borderTop:`1px solid ${C.line}`}});
      bd.appendChild(h("div",{style:{padding:"10px 16px",background:C.surface,fontSize:"12px",color:C.slate,borderBottom:`1px solid ${C.line}`}},`💡 ${k.info}`));
      const fl=h("div",{style:{padding:"4px 16px 12px"}});
      k.felder.forEach((f,i)=>{
        const checked=!!s.checked[`${k.id}::${f}`];
        const row=h("div",{style:{display:"flex",alignItems:"center",gap:"12px",padding:"12px 0",borderBottom:i<k.felder.length-1?`1px solid ${C.line}`:"none",cursor:"pointer"}});
        row.addEventListener("click",()=>{const key=`${k.id}::${f}`;const nc={...state.angebot.checked,[key]:!state.angebot.checked[key]};setState("angebot.checked",nc);});
        const cb=h("div",{style:{width:"24px",height:"24px",borderRadius:"6px",flexShrink:"0",border:`2px solid ${checked?"#22c55e":C.line}`,background:checked?"#22c55e":C.white,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}});
        if(checked) cb.appendChild(h("span",{style:{color:"#fff",fontSize:"14px",fontWeight:"800"}},"✓"));
        row.appendChild(cb);
        row.appendChild(h("span",{style:{fontSize:"14px",color:checked?C.muted:C.ink,textDecoration:checked?"line-through":"none"}},f));
        fl.appendChild(row);
      });
      bd.appendChild(fl); kc.appendChild(bd);
    }
    wrap.appendChild(kc);
  });

  // Generate
  const gc=h("div",{style:{background:C.white,border:`1px solid ${C.line}`,borderRadius:"16px",padding:"16px"}});
  gc.appendChild(h("p",{style:{fontSize:"13px",color:C.slate,marginBottom:"14px",lineHeight:"1.6"}},allPflicht?"✅ Bereit — Angebot kann generiert werden.":"Hake die Pflichtfelder ab bevor du generierst."));
  gc.appendChild(s.loading?primaryBtn([spinnerEl()," Generiere Angebot…"],null,{disabled:true,gold:true}):primaryBtn("📄 Angebot jetzt generieren",generateAngebot,{gold:true}));
  wrap.appendChild(gc);

  if(s.loading||s.result||s.error){
    const ob=h("div",{style:{padding:"16px"}});
    if(s.loading){const ld=h("div",{style:{textAlign:"center",padding:"40px",color:C.muted}});const sp=h("div",{style:{width:"32px",height:"32px",border:`3px solid ${C.line}`,borderTopColor:C.gold,borderRadius:"50%",margin:"0 auto 12px"}});sp.className="spin";ld.appendChild(sp);ld.appendChild(h("p",{style:{fontSize:"14px"}},"KI erstellt Angebot…"));ob.appendChild(ld);}
    if(s.error) ob.appendChild(errBox(s.error));
    if(s.result){
      const r=s.result;
      const txt=()=>`${r.titel}\n\n${r.zusammenfassung}\n\nLeistungen:\n${(r.leistungen||[]).map(l=>`• ${l}`).join("\n")}\n\nPreis:\n${r.preis}\n\nNächste Schritte:\n${(r.naechsteSchritte||[]).map((s,i)=>`${i+1}. ${s}`).join("\n")}\n\n${r.fazit}`;
      ob.appendChild(h("div",{style:{fontSize:"18px",fontWeight:"800",color:C.ink,lineHeight:"1.3",marginBottom:"10px"}},r.titel));
      ob.appendChild(h("div",{style:{fontSize:"14px",color:"#334155",lineHeight:"1.7",marginBottom:"16px"}},r.zusammenfassung));
      const lb=h("div",{style:{background:C.surface,borderRadius:"10px",padding:"14px",border:`1px solid ${C.line}`,marginBottom:"14px"}});
      lb.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"700",color:C.slate,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"10px"}},"Leistungsumfang"));
      (r.leistungen||[]).forEach((l,i)=>{const row=h("div",{style:{display:"flex",gap:"10px",padding:"7px 0",borderBottom:i<(r.leistungen.length-1)?`1px solid ${C.line}`:"none"}});row.appendChild(h("span",{style:{color:"#22c55e",fontWeight:"700",flexShrink:"0"}},"✓"));row.appendChild(h("span",{style:{fontSize:"14px",color:C.ink}},l));lb.appendChild(row);});
      ob.appendChild(lb);
      const pb2=h("div",{style:{background:C.goldLt,borderRadius:"10px",padding:"14px",border:`1px solid ${C.goldBdr}`,marginBottom:"14px"}});
      pb2.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"700",color:C.gold,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"6px"}},"💶 Preisindikation"));
      pb2.appendChild(h("div",{style:{fontSize:"14px",color:C.ink,lineHeight:"1.6"}},r.preis));
      ob.appendChild(pb2);
      const sb=h("div",{style:{marginBottom:"14px"}});
      sb.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"700",color:C.slate,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"10px"}},"Nächste Schritte"));
      (r.naechsteSchritte||[]).forEach((s,i)=>{const row=h("div",{style:{display:"flex",gap:"10px",padding:"7px 0",alignItems:"flex-start"}});const num=h("div",{style:{width:"22px",height:"22px",borderRadius:"50%",background:C.ink,color:"#fff",fontSize:"11px",fontWeight:"700",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0",marginTop:"2px"}},String(i+1));row.appendChild(num);row.appendChild(h("span",{style:{fontSize:"14px",color:C.ink,lineHeight:"1.5"}},s));sb.appendChild(row);});
      ob.appendChild(sb);
      ob.appendChild(h("div",{style:{background:C.blueLt,borderRadius:"10px",padding:"14px",border:"1px solid #93c5fd",fontSize:"14px",color:C.blue,lineHeight:"1.6"}},r.fazit));
      wrap.appendChild(card(sHead("📄 Ihr Angebot",copyBtn(txt)),ob));
      return wrap;
    }
    wrap.appendChild(card(sHead("📄 Ihr Angebot"),ob));
  }
  return wrap;
}

async function generateAngebot(){
  setState("angebot.loading",true); setState("angebot.result",null); setState("angebot.error","");
  const s=state.angebot;
  const daten=KACHELN.map(k=>{const done=k.felder.filter(f=>s.checked[`${k.id}::${f}`]);return done.length?`${k.titel}: ${done.join(", ")}`:null;}).filter(Boolean).join("\n");
  try{
    const r=await callClaude(
      `Du bist Experte für Hausverwaltungsverträge. Erstelle ein professionelles Angebotsdokument auf Deutsch.\nAntworte NUR mit JSON ohne Backticks: {"titel":"...","zusammenfassung":"...","leistungen":["..."],"preis":"...","naechsteSchritte":["..."],"fazit":"..."}\nErstelle ein vollständiges überzeugendes Angebot.`,
      `Erstelle Angebot basierend auf:\n${daten||"Basis-Hausverwaltungspaket"}`,1500
    );
    state.angebot.loading=false; state.angebot.result=r; state.angebot.error="";
  }catch(e){state.angebot.loading=false;state.angebot.result=null;state.angebot.error=e.message||"Fehler.";}
  render();
}

// RENDER
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  const header=h("div",{style:{background:C.ink,padding:"13px 16px",display:"flex",alignItems:"center",gap:"10px",position:"sticky",top:"0",zIndex:"100"}});
  header.appendChild(h("div",{style:{width:"34px",height:"34px",border:`2px solid ${C.gold}`,borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",color:C.gold,fontWeight:"800",fontSize:"16px",flexShrink:"0"}},"H"));
  const ht=h("div",{});
  ht.appendChild(h("div",{style:{color:C.white,fontWeight:"700",fontSize:"15px",lineHeight:"1.2"}},"Hausverwaltungs-Agent"));
  ht.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},"KI-gestützt · Professionell"));
  header.appendChild(ht);
  header.appendChild(h("div",{style:{marginLeft:"auto",fontSize:"10px",fontWeight:"700",background:"rgba(196,154,26,0.15)",color:C.gold,padding:"3px 9px",borderRadius:"20px",border:"1px solid rgba(196,154,26,0.3)",textTransform:"uppercase",letterSpacing:"0.05em",flexShrink:"0"}},"Beta"));
  app.appendChild(header);

  const tabs=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",background:C.white,borderBottom:`1px solid ${C.line}`,position:"sticky",top:"60px",zIndex:"99"}});
  [["email","✉️","E-Mail Agent"],["angebot","📄","Angebotserstellung"]].forEach(([id,icon,label])=>{
    const active=state.tab===id;
    const tb=h("button",{style:{padding:"12px 8px",border:"none",background:"none",fontSize:"12px",fontWeight:"600",color:active?C.ink:C.muted,borderBottom:`2px solid ${active?C.gold:"transparent"}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"5px"}},icon," ",label);
    tb.addEventListener("click",()=>setState("tab",id));
    tabs.appendChild(tb);
  });
  app.appendChild(tabs);
  app.appendChild(state.tab==="email"?renderEmail():renderAngebot());
}

render();
</script>
